<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="217" height="46" viewBox="0 0 217 46"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Scale everything proportionally inside this coordinate system -->

  <!-- Medical Cross -->
  <rect x="5" y="8" width="10" height="30" fill="#4CAF50"/>
  <rect x="0" y="15" width="20" height="10" fill="#4CAF50"/>

  <!-- Heart -->
  <path d="M22 23 
           C22 16, 32 16, 32 23
           C32 16, 42 16, 42 23
           C42 32, 32 38, 32 38
           C32 38, 22 32, 22 23 Z" 
        fill="#1565C0"/>

  <!-- ECG Line -->
  <polyline points="20,24 26,24 29,20 32,28 35,22 39,24 45,24"
            fill="none" stroke="white" stroke-width="1"/>

  <!-- Text -->
  <text x="55" y="30" font-family="Arial, Helvetica, sans-serif"
        font-size="18" font-weight="bold">
    <tspan fill="#1565C0">Better</tspan>
    <tspan fill="#4CAF50">Health</tspan>
  </text>

</svg>
